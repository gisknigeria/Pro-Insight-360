services:
  - type: web
    name: pro-insight-360-api
    runtime: node
    plan: standard
    branch: main
    installCommand: corepack enable && pnpm install --frozen-lockfile --prod=false && pnpm --dir apps/api install --frozen-lockfile --prod=false && pnpm run postinstall
    buildCommand: pnpm --dir apps/api exec tsc -p tsconfig.build.json
    startCommand: pnpm run migrate:deploy && node apps/api/dist/src/main.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 24h
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: UPSTASH_REDIS_REST_URL
        sync: false
      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false
      - key: B2_KEY_ID
        sync: false
      - key: B2_APPLICATION_KEY
        sync: false
      - key: B2_BUCKET_NAME
        value: pro-insight-360-files
      - key: B2_BUCKET_ID
        sync: false
      - key: B2_ENDPOINT
        value: https://s3.us-east-005.backblazeb2.com
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: BREVO_API_KEY
        sync: false
      - key: BREVO_FROM_EMAIL
        sync: false
      - key: BREVO_FROM_NAME
        value: Pro-Insight 360
      - key: FRONTEND_URL
        sync: false
